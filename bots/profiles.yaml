# Bot profiles for Hitster Online
#
# Each profile defines the personality and skill of one bot player.
# The runner (index.ts) reads this file and instantiates one bot per entry,
# or a subset when --count N is passed.
#
# Field reference:
#   knowledge         0.0–1.0  Base chance of placing the card in the right spot
#   genre_affinities  list     Genres the bot knows well (+0.15 per match, max 1.0)
#   naming_willingness 0.0–1.0 Chance of attempting to name title+artist for a token
#   challenge_rate    0.0–1.0  Chance of shouting HITSTER! when a wrong placement is suspected
#   reaction_time_ms  min/max  Simulated thinking delay in milliseconds
#   token_strategy    hoard | spend | balanced
#   join_willingness  0.0–1.0  Preference for joining a lobby (<3 players) vs creating a new room

