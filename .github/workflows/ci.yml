name: CI

on:
  push:
  pull_request:

jobs:
  server:
    name: Server — build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        working-directory: server
        run: npm run build

      - name: Test
        working-directory: server
        run: npm run test:ci

  client:
    name: Client — build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [server, client]

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Start server
        run: TEST_MODE=true SPOTIFY_CLIENT_ID=test SPOTIFY_CLIENT_SECRET=test PORT=3000 node dist/server/src/index.js &

      - name: Wait for server
        run: npx wait-on http://localhost:3000/health --timeout 15000

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
