[variables]
SPOTIFY_CLIENT_ID = ""
SPOTIFY_CLIENT_SECRET = ""
# Railway sets PORT automatically; override only if needed (e.g. local parity).
PORT = ""
# Public app URL for CORS when the client is served separately; omit for same-origin deploy.
CLIENT_URL = ""

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build -w server && npm run build -w client"

[deploy]
startCommand = "npm run start -w server"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production.deploy]
minInstances = 1
