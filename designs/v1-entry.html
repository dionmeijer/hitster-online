<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitster — Enter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #e0e0ff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }

  .scanlines { position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px); pointer-events: none; z-index: 100; }

  /* ── Header ── */
  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-bottom: 2px solid #7c3aed; background: #0f0f1a; }
  .logo { font-family: 'Press Start 2P', monospace; font-size: 14px; color: #a78bfa; text-shadow: 0 0 20px #7c3aed; }
  .header-tag { font-family: 'Press Start 2P', monospace; font-size: 8px; color: #4ade80; border: 1px solid #4ade80; padding: 5px 10px; }

  /* ── Main layout ── */
  .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

  .entry-box { width: 100%; max-width: 480px; }

  /* ── Hero title ── */
  .hero { text-align: center; margin-bottom: 48px; }
  .hero-title { font-family: 'Press Start 2P', monospace; font-size: 32px; color: #a78bfa; text-shadow: 0 0 40px #7c3aed, 0 0 80px rgba(124,58,237,0.3); line-height: 1.4; }
  .hero-title span { color: #4ade80; text-shadow: 0 0 30px #4ade80; }
  .hero-sub { font-size: 16px; color: #6b7280; margin-top: 16px; letter-spacing: 0.5px; line-height: 1.5; }

  /* ── Form card ── */
  .form-card { background: #0f0f1a; border: 2px solid #1e1e3a; padding: 32px; }

  .field { margin-bottom: 24px; }
  .field-label { font-family: 'Press Start 2P', monospace; font-size: 7px; color: #6366f1; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .required-dot { width: 5px; height: 5px; border-radius: 50%; background: #ef4444; display: inline-block; }
  .optional-tag { font-family: 'Rajdhani', sans-serif; font-size: 11px; color: #374151; font-weight: 600; letter-spacing: 0; }

  .input { width: 100%; background: #1e1e3a; border: 2px solid #374151; color: #e0e0ff; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600; padding: 12px 16px; outline: none; transition: all 0.2s; }
  .input::placeholder { color: #374151; font-weight: 400; }
  .input:focus { border-color: #7c3aed; box-shadow: 0 0 16px rgba(124,58,237,0.3); }
  .input:focus::placeholder { color: #4a5568; }
  .input.valid { border-color: #4ade80; }
  .input.error { border-color: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.2); }

  .field-hint { font-size: 12px; color: #4b5563; margin-top: 8px; line-height: 1.4; }
  .field-error { font-size: 12px; color: #ef4444; margin-top: 8px; display: none; }
  .field-error.show { display: block; }

  /* ── Display name preview ── */
  .display-preview { background: #0a0a0f; border: 1px solid #1e1e3a; padding: 10px 14px; margin-top: 10px; display: flex; align-items: center; gap: 10px; }
  .dp-label { font-family: 'Press Start 2P', monospace; font-size: 6px; color: #6b7280; }
  .dp-avatar { width: 24px; height: 24px; background: #1a0a2e; border: 1px solid #7c3aed; display: flex; align-items: center; justify-content: center; font-family: 'Press Start 2P', monospace; font-size: 8px; color: #a78bfa; flex-shrink: 0; }
  .dp-name { font-size: 14px; font-weight: 700; color: #e0e0ff; }

  .divider { border: none; border-top: 1px solid #1e1e3a; margin: 8px 0 28px; }

  /* ── Action buttons ── */
  .actions { display: flex; flex-direction: column; gap: 12px; }
  .btn { width: 100%; padding: 14px 20px; border: 2px solid; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-create { background: #7c3aed; border-color: #6d28d9; color: #fff; }
  .btn-create:not(:disabled):hover { background: #8b5cf6; box-shadow: 0 0 24px rgba(124,58,237,0.5); }

  .btn-join { background: transparent; border-color: #4ade80; color: #4ade80; }
  .btn-join:not(:disabled):hover { background: rgba(74,222,128,0.08); box-shadow: 0 0 16px rgba(74,222,128,0.25); }

  .btn-icon { font-size: 16px; }

  /* ── Join code inline expand ── */
  .join-section { display: none; }
  .join-section.open { display: flex; flex-direction: column; gap: 10px; }
  .join-row { display: flex; gap: 8px; }
  .join-row .input { font-family: 'Press Start 2P', monospace; font-size: 13px; text-transform: uppercase; letter-spacing: 3px; text-align: center; }
  .btn-join-confirm { flex-shrink: 0; padding: 12px 20px; background: #4ade80; border: 2px solid #16a34a; color: #0a0a0f; font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.15s; white-space: nowrap; }
  .btn-join-confirm:hover { background: #86efac; }
  .btn-join-cancel { font-size: 12px; color: #6b7280; background: none; border: none; cursor: pointer; padding: 4px; font-family: 'Rajdhani', sans-serif; text-align: center; text-transform: uppercase; letter-spacing: 1px; transition: color 0.15s; }
  .btn-join-cancel:hover { color: #e0e0ff; }

  /* ── Or divider ── */
  .or-row { display: flex; align-items: center; gap: 12px; }
  .or-line { flex: 1; height: 1px; background: #1e1e3a; }
  .or-text { font-family: 'Press Start 2P', monospace; font-size: 7px; color: #374151; }

  /* ── Scan flicker animation on load ── */
  @keyframes flicker { 0%,95%,100%{opacity:1}96%{opacity:0.85}97%{opacity:1}98%{opacity:0.9} }
  .form-card { animation: flicker 4s infinite; }

  /* ── Cursor blink on logo ── */
  .cursor { display: inline-block; width: 12px; height: 20px; background: #a78bfa; animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 4px; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
</style>
</head>
<body>
<div class="scanlines"></div>

<header>
  <div class="logo">HITSTER</div>
  <div class="header-tag">v1.0.0</div>
</header>

<div class="page">
  <div class="entry-box">

    <div class="hero">
      <div class="hero-title">HIT<span>STER</span><div class="cursor"></div></div>
      <div class="hero-sub">Build your timeline. Guess the decade.<br>First to 10 songs wins.</div>
    </div>

    <div class="form-card">

      <!-- Email field -->
      <div class="field">
        <div class="field-label">
          <span class="required-dot"></span>
          Email address
        </div>
        <input class="input" id="emailInput" type="email" placeholder="you@example.com" autocomplete="email" oninput="onEmailInput()" onblur="validateEmail()" />
        <div class="field-error" id="emailError">Enter a valid email address</div>
        <div class="field-hint">Used to identify you across sessions. Not shown to other players.</div>
      </div>

      <!-- Name field -->
      <div class="field">
        <div class="field-label">
          Display name
          <span class="optional-tag">optional</span>
        </div>
        <input class="input" id="nameInput" type="text" placeholder="Leave blank to use your email" maxlength="24" oninput="onNameInput()" />
        <div class="display-preview" id="preview">
          <div class="dp-label">Shown as</div>
          <div class="dp-avatar" id="previewAvatar">?</div>
          <div class="dp-name" id="previewName">—</div>
        </div>
      </div>

      <hr class="divider" />

      <!-- Create room -->
      <div class="actions">
        <button class="btn btn-create" id="createBtn" disabled onclick="createRoom()">
          <span class="btn-icon">⊕</span> Create a room
        </button>

        <div class="or-row"><div class="or-line"></div><div class="or-text">or</div><div class="or-line"></div></div>

        <!-- Join section -->
        <div id="joinToggle">
          <button class="btn btn-join" id="joinBtn" disabled onclick="openJoin()">
            <span class="btn-icon">→</span> Join a room
          </button>
        </div>

        <div class="join-section" id="joinSection">
          <div class="join-row">
            <input class="input" id="codeInput" type="text" placeholder="XXXX" maxlength="4" oninput="onCodeInput(this)" />
            <button class="btn-join-confirm" onclick="joinRoom()">Join</button>
          </div>
          <button class="btn-join-cancel" onclick="closeJoin()">← Back</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const emailInput = document.getElementById('emailInput');
  const nameInput  = document.getElementById('nameInput');
  const createBtn  = document.getElementById('createBtn');
  const joinBtn    = document.getElementById('joinBtn');
  const previewAvatar = document.getElementById('previewAvatar');
  const previewName   = document.getElementById('previewName');
  const emailError    = document.getElementById('emailError');

  function isValidEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
  }

  function displayName() {
    const name  = nameInput.value.trim();
    const email = emailInput.value.trim();
    if (name)  return name;
    if (email) return email.split('@')[0]; // fallback: local part of email
    return null;
  }

  function avatarChar(label) {
    return label ? label[0].toUpperCase() : '?';
  }

  function updatePreview() {
    const label = displayName();
    if (label) {
      previewName.textContent   = label;
      previewAvatar.textContent = avatarChar(label);
    } else {
      previewName.textContent   = '—';
      previewAvatar.textContent = '?';
    }
  }

  function updateButtons() {
    const valid = isValidEmail(emailInput.value);
    createBtn.disabled = !valid;
    joinBtn.disabled   = !valid;
    if (valid) {
      emailInput.classList.remove('error');
      emailInput.classList.add('valid');
    }
  }

  function onEmailInput() {
    emailError.classList.remove('show');
    emailInput.classList.remove('error');
    updatePreview();
    updateButtons();
  }

  function onNameInput() {
    updatePreview();
  }

  function validateEmail() {
    const v = emailInput.value.trim();
    if (v && !isValidEmail(v)) {
      emailInput.classList.add('error');
      emailInput.classList.remove('valid');
      emailError.classList.add('show');
    }
  }

  function openJoin() {
    document.getElementById('joinToggle').style.display = 'none';
    document.getElementById('joinSection').classList.add('open');
    document.getElementById('codeInput').focus();
  }

  function closeJoin() {
    document.getElementById('joinToggle').style.display = '';
    document.getElementById('joinSection').classList.remove('open');
    document.getElementById('codeInput').value = '';
  }

  function onCodeInput(el) {
    el.value = el.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  }

  function createRoom() {
    if (!isValidEmail(emailInput.value)) return;
    const display = displayName();
    // Demo: navigate to gameplay screen
    const params = new URLSearchParams({ email: emailInput.value.trim(), name: display || '' });
    window.location.href = 'v1-dark-arcade.html?' + params;
  }

  function joinRoom() {
    const code = document.getElementById('codeInput').value.trim();
    if (code.length !== 4) {
      document.getElementById('codeInput').classList.add('error');
      return;
    }
    if (!isValidEmail(emailInput.value)) return;
    const display = displayName();
    const params = new URLSearchParams({ email: emailInput.value.trim(), name: display || '', room: code });
    window.location.href = 'v1-dark-arcade.html?' + params;
  }

  // Allow Enter key on code input to submit
  document.getElementById('codeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinRoom();
  });
  emailInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !createBtn.disabled) createRoom();
  });
</script>
</body>
</html>
